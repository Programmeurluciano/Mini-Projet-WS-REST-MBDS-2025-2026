<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Email Confirmation</title>
</head>

<body style="font-family: Arial; background:#f5f5f5; padding:40px">

    <div style="max-width:600px;margin:auto;background:white;padding:30px;border-radius:8px">

        <h2>Welcome to Movie API </h2>

        <p>Hello <span th:text="${name}"></span>,</p>

        <p>
            Thank you for registering. Please confirm your email address
            by clicking the button below.
        </p>

        <div style="margin-top:30px">
            <a th:href="${confirmationLink}" style="
           background:#4CAF50;
           padding:12px 24px;
           color:white;
           text-decoration:none;
           border-radius:6px;
           font-weight:bold;">
                Confirm Account
            </a>
        </div>

        <p style="margin-top:30px;font-size:12px;color:gray">
            If you didn't create this account you can ignore this email.
        </p>

    </div>

</body>

</html>
